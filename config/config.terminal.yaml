# WeClaw 终端模式 — 最小化配置
# 只需要配 AI 就能跑！
#
# 用法：
#   1. 复制为 config/config.yaml
#   2. 填入你的 API Key
#   3. python -m weclaw
#
# 也可以不写配置文件，直接用环境变量：
#   export OPENAI_API_KEY=sk-xxx
#   python -m weclaw

# AI 模型配置（必填）
ai:
  api_key: "your_api_key"      # 🔑 OpenAI / DeepSeek / Moonshot 等
  model: "gpt-4o"              # 模型名称
  base_url: null               # 自定义 API 地址（国产模型必填）
  # 例：
  # base_url: "https://api.deepseek.com/v1"   model: "deepseek-chat"
  # base_url: "https://api.moonshot.cn/v1"     model: "moonshot-v1-8k"

# 行为配置（可选，用默认值也行）
behavior:
  confirm_before_send: true    # 发送前是否需要你确认
  tone: "auto"                 # 消息风格：formal / casual / auto

# 🦞↔🦞 龙虾互联配置（默认自动启用 Relay 模式）
claw2claw:
  enabled: true                # 是否启用龙虾互联
  relay_enabled: true          # 是否使用 Relay（推荐，零配置）
  relay_url: "ws://localhost:8900"   # Relay Server 地址
  lobster_name: "🦞 我的龙虾"    # 龙虾的名字（自定义）
  owner_name: "我"              # 你的名字（对方会看到）
  # lobster_id: ""             # 龙虾号（留空 = 自动生成并持久化到 SQLite，重启不变）
  #                            # 如果手动指定（如 "lobster_alice"），会优先使用此值

  # 🦞 v0.8: 龙虾画像（自定义你的龙虾形象）
  agent_profile:
    description: "我的 AI 助手龙虾"
    services_offered: []
    services_needed: []
    interests: []
    welcome_bubbles:
      - "你好！很高兴认识你 🦞"
    values: []
    personal_looking_for: ""
    industries: []
    location_area: ""
    language: "zh"
    page_public: true

  # 🦞 v0.8: 龙虾行为规则（可选，用默认值也行）
  agent_behavior:
    proactive:
      enabled: false
      discovery_interval_minutes: 30
